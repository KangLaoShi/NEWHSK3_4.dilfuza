                    linesHtml += `
                        <div class="flex gap-4 group">
                            <div class="min-w-[80px] text-right mt-1 font-bold text-indigo-400">${line.speaker}:</div>
                            <div class="flex-1 bg-slate-900/50 p-4 rounded-2xl rounded-tl-none border border-slate-800 group-hover:border-slate-600 transition">
                                <div class="flex justify-between items-start mb-2">
                                    <p class="text-2xl text-white font-medium">${line.hanzi}</p>
                                    <button onclick="playAudio('${safeHanzi}', event)" class="text-slate-500 hover:text-indigo-400 transition">
                                        <i class="ph-fill ph-play-circle text-2xl"></i>
                                    </button>
                                </div>
                                <p class="text-indigo-300 mb-3">${line.pinyin}</p>
                                <div class="space-y-1 text-sm border-t border-slate-800 pt-3 mt-3">
                                    <p class="text-slate-300"><span class="text-slate-500 font-bold">UZ:</span> ${line.uz}</p>
                                    <p class="text-slate-400"><span class="text-slate-600 font-bold">RU:</span> ${line.ru}</p>
                                    <p class="text-slate-500"><span class="text-slate-600 font-bold">EN:</span> ${line.en}</p>
                                </div>
                            </div>
                        </div>`;
                });
                html += `
                    <div class="bg-slate-800/50 border border-slate-700 rounded-3xl overflow-hidden shadow-2xl">
                        <div class="bg-slate-800 p-6 border-b border-slate-700">
                            <h2 class="text-3xl font-bold text-white mb-4">${dialogue.title}</h2>
                            <div class="space-y-1 text-sm">
                                <p class="text-indigo-300"><span class="font-semibold text-slate-400">UZ:</span> ${dialogue.contextUz}</p>
                                <p class="text-slate-300"><span class="font-semibold text-slate-500">RU:</span> ${dialogue.contextRu}</p>
                                <p class="text-slate-400"><span class="font-semibold text-slate-500">EN:</span> ${dialogue.contextEn}</p>
                            </div>
                        </div>
                        <div class="p-6 space-y-6">${linesHtml}</div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // --- 4. GRAMMAR LOGIC ---
        function renderGrammar() {
            const container = document.getElementById('view-grammar');
            let html = '';
            grammarData.forEach(grammar => {
                let examplesHtml = '';
                grammar.examples.forEach(ex => {
                    const safeHanzi = ex.hanzi.replace(/'/g, "\\'");
                    examplesHtml += `
                        <div class="bg-slate-800 p-4 border border-slate-600 rounded-xl flex justify-between items-center group">
                            <div>
                                <p class="text-xl text-white font-medium mb-1">${ex.hanzi}</p>
                                <p class="text-indigo-400 mb-1">${ex.pinyin}</p>
                                <p class="text-slate-400 text-sm">${ex.uz}</p>
                            </div>
                            <button onclick="playAudio('${safeHanzi}', event)" class="text-slate-500 group-hover:text-indigo-400 transition ml-4">
                                <i class="ph-fill ph-play-circle text-3xl"></i>
                            </button>
                        </div>`;
                });
                html += `
                    <div class="bg-slate-800 rounded-3xl p-8 border border-slate-700 shadow-xl">
                        <h2 class="text-2xl font-bold text-white mb-6 pb-4 border-b border-slate-700">${grammar.title}</h2>
                        <div class="space-y-4 mb-8 bg-slate-900/50 p-6 rounded-2xl">
                            <div><span class="text-indigo-400 font-bold uppercase text-xs tracking-wider">O'zbekcha tushuntirish</span><p class="text-slate-200 mt-1">${grammar.ruleUz}</p></div>
                            <div><span class="text-slate-500 font-bold uppercase text-xs tracking-wider">Русское объяснение</span><p class="text-slate-400 mt-1">${grammar.ruleRu}</p></div>
                            <div><span class="text-slate-600 font-bold uppercase text-xs tracking-wider">English explanation</span><p class="text-slate-500 mt-1">${grammar.ruleEn}</p></div>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-indigo-300 mb-4">Misollar / Примеры / Examples:</h3>
                            <div class="space-y-4">${examplesHtml}</div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // --- 5. GRAMMAR QUIZ LOGIC ---
        function startGQuiz() {
            gquizIndex = 0;
            gquizScore = 0;
            gquizAnswered = false;
            document.getElementById('gquiz-active').classList.remove('hidden');
            const res = document.getElementById('gquiz-result');
            res.classList.add('hidden'); res.classList.remove('flex');
            renderGQuiz();
        }
        function renderGQuiz() {
            gquizAnswered = false;
            const q = grammarQuizData[gquizIndex];
            document.getElementById('gquiz-counter').innerText = `Savol ${gquizIndex + 1} / ${grammarQuizData.length}`;
            document.getElementById('gquiz-score').innerText = `Ball: ${gquizScore}`;
            document.getElementById('gquiz-question').innerText = q.question;

            const container = document.getElementById('gquiz-options');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "p-6 rounded-xl border-2 text-xl font-semibold transition-all duration-300 flex justify-between items-center bg-slate-800 hover:bg-slate-700 border-slate-700 text-slate-200";
                btn.innerText = opt;
                btn.onclick = () => handleGQuizOption(idx);
                container.appendChild(btn);
            });
        }
        function handleGQuizOption(selectedIndex) {
            if (gquizAnswered) return;
            gquizAnswered = true;
            const q = grammarQuizData[gquizIndex];
            const isCorrect = selectedIndex === q.correctIndex;
            if (isCorrect) { gquizScore++; document.getElementById('gquiz-score').innerText = `Ball: ${gquizScore}`; }

            const btns = document.getElementById('gquiz-options').children;
            for (let i = 0; i < btns.length; i++) {
                if (i === q.correctIndex) {
                    btns[i].className = "p-6 rounded-xl border-2 text-xl font-semibold transition-all duration-300 flex justify-between items-center bg-emerald-900/50 border-emerald-500 text-emerald-300";
                    btns[i].innerHTML += '<i class="ph-fill ph-check-circle text-2xl"></i>';
                } else if (i === selectedIndex && !isCorrect) {
                    btns[i].className = "p-6 rounded-xl border-2 text-xl font-semibold transition-all duration-300 flex justify-between items-center bg-rose-900/50 border-rose-500 text-rose-300";
                    btns[i].innerHTML += '<i class="ph-fill ph-x-circle text-2xl"></i>';
                } else {
                    btns[i].className = "p-6 rounded-xl border-2 text-xl font-semibold transition-all duration-300 flex justify-between items-center bg-slate-800 opacity-50 border-slate-800 text-slate-500";
                }
            }
            setTimeout(() => {
                if (gquizIndex + 1 < grammarQuizData.length) { gquizIndex++; renderGQuiz(); } 
                else {
                    document.getElementById('gquiz-active').classList.add('hidden');
                    const res = document.getElementById('gquiz-result');
                    res.classList.remove('hidden'); res.classList.add('flex');
                    document.getElementById('gquiz-final-score').innerText = `${gquizScore} / ${grammarQuizData.length}`;
                }
            }, 1200);
        }

        // --- 6. FILL IN THE BLANKS LOGIC ---
        function renderFillBlanks() {
            // Render word bank
            const bankContainer = document.getElementById('fill-word-bank');
            bankContainer.innerHTML = '';
            allFillWords.forEach(word => {
                const span = document.createElement('span');
                span.className = "px-3 py-1 bg-slate-700 text-slate-200 rounded-lg text-sm font-medium border border-slate-600";
                span.innerText = word;
                bankContainer.appendChild(span);
            });

            // Render sentences
            const sentencesContainer = document.getElementById('fill-sentences-container');
            sentencesContainer.innerHTML = '';
            
            fillBlanksData.forEach((item, idx) => {
                const parts = item.sentence.split("_____");
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-slate-800/50 p-4 rounded-xl border border-slate-700";
                
                let selectOptions = `<option value="" disabled selected>____</option>`;
                allFillWords.forEach(w => {
                    const isSelected = fillAnswers[idx] === w ? "selected" : "";
                    selectOptions += `<option value="${w}" ${isSelected}>${w}</option>`;
                });

                let statusIcon = '';
                let selectClass = "bg-slate-900 border border-indigo-500 text-indigo-300 outline-none rounded-lg px-2 py-1 font-bold text-center appearance-none cursor-pointer";
                
                if (fillResults[idx] === true) {
                    selectClass = selectClass.replace("border-indigo-500 text-indigo-300", "border-emerald-500 text-emerald-400");
                    statusIcon = `<i class="ph-fill ph-check-circle text-emerald-500 text-2xl flex-shrink-0"></i>`;
                } else if (fillResults[idx] === false) {
                    selectClass = selectClass.replace("border-indigo-500 text-indigo-300", "border-rose-500 text-rose-400");
                    statusIcon = `<i class="ph-fill ph-x-circle text-rose-500 text-2xl flex-shrink-0"></i>`;
                }

                div.innerHTML = `
                    <span class="text-slate-500 font-mono">${idx + 1}.</span>
                    <div class="flex-1 text-lg text-slate-200 flex items-center flex-wrap gap-2 leading-relaxed">
                        ${parts[0]}
                        <select onchange="handleFillSelect(${idx}, this.value)" class="${selectClass}">
                            ${selectOptions}
                        </select>
                        ${parts[1]}
                    </div>
                    ${statusIcon}
                `;
                sentencesContainer.appendChild(div);
            });
        }

        function handleFillSelect(index, val) {
            fillAnswers[index] = val;
            if (val) {
                fillResults[index] = val === fillBlanksData[index].answer;
            }
            renderFillBlanks(); // Re-render to show updated colors/icons
        }

        // --- INIT ---
        window.onload = () => {
            renderCard();
            startQuiz();
            startGQuiz();
            renderDialogues();
            renderGrammar();
            renderFillBlanks();
            switchTab('flashcards'); // default tab
        };
    </script>
</body>
</html>
